services:
  - type: web
    plan: free
    name: Rename Bot 2GB
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    branch: main
    autoDeploy: false
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: FORCE_SUBS
        sync: false
      - key: LOG_CHANNEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: START_PIC
        sync: false
      - key: ADMIN
        sync: false
      - key: WEBHOOK
        value: "True"
